; Asterisk dialplan for Pizza Phone
; Routes inbound POTS calls from Booth Phone through AGI game logic,
; then connects to Upstairs Phone on successful code entry.
;
; Deployment: copy this file and pjsip.conf to /etc/asterisk/
; The AGI script path should match the deployed location.

[general]
static=yes
writeprotect=yes
csvformat=comment,callers,destination,channel,dcontext,channeldest

; Inbound context for the Booth Phone (POTS via Grandstream HT814)
[from-pots]
exten => _X.,1,NoOp(Pizza Phone inbound call from ${CALLERID(num)})
 same => n,AGI(/var/lib/asterisk/agi/main.py)
 same => n,Hangup()

; Success context — connected to Upstairs Phone
[pizza-success]
exten => s,1,NoOp(Connecting caller to Upstairs Phone extension ${UPSTREAM_EXT})
 same => n,Dial(PJSIP/${UPSTREAM_EXT},30)
 same => n,Hangup()

; Fail context — goodbye message
[pizza-fail]
exten => s,1,NoOp(Code entry failed, hanging up)
 same => n,Hangup()
