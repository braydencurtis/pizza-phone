; PJSIP configuration for Pizza Phone endpoints

; Grandstream HT814 POTS gateway (Booth Phone)
[ht814-gateway]
type=endpoint
aors=ht814-aor
context=from-pots
disallow=all
allow=ulaw
allow=alaw

[ht814-aor]
type=aor
max_contacts=1

[ht814-transport]
type=transport
protocol=udp
bind=0.0.0.0

; Yealink T46G (Upstairs Phone — extension 200)
[yelink-200]
type=endpoint
aors=yelink-200-aor
context=from-internal
auth=yelink-200-auth
disallow=all
allow=ulaw
allow=alaw

[yelink-200-aor]
type=aor
max_contacts=1

[yelink-200-auth]
type=auth
auth_type=userpass
username=200
password=yealinkpass
